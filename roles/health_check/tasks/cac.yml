---
- name: cac | Set Controller connection variables
  ansible.builtin.set_fact:
    __health_check_controller_host: >-
      {{ __health_check_lab_config['control_node']['aap_url'] }}
    __health_check_controller_user: >-
      {{ __health_check_lab_config['control_node']['aap_username'] }}
    __health_check_controller_password: >-
      {{ health_check_aap_password | default(
      __health_check_lab_config['control_node']['aap_password'] |
      default('')) }}

- name: cac | Check inventories exist
  ansible.controller.inventory:
    name: "{{ item['name'] }}"
    organization: Default
    controller_host: "{{ __health_check_controller_host }}"
    controller_username: "{{ __health_check_controller_user }}"
    controller_password: "{{ __health_check_controller_password }}"
    validate_certs: false
    state: present
  check_mode: true
  delegate_to: "{{ __health_check_control_host }}"
  register: __health_check_cac_inv
  ignore_errors: true
  loop: >-
    {{ __health_check_lab_config['cac_objects'] | default([]) |
    selectattr('kind', 'equalto', 'inventory') | list }}
  loop_control:
    label: "{{ item['name'] }}"

- name: cac | Record inventory results
  ansible.builtin.set_fact:
    __health_check_results: >-
      {{ __health_check_results + [{'layer': 'cac',
      'check': 'Inventory "' + item['item']['name'] + '" exists',
      'passed': item is not failed and item is not changed}] }}
  loop: "{{ __health_check_cac_inv.results | default([]) }}"
  loop_control:
    label: "{{ item['item']['name'] }}"

- name: cac | Check projects exist
  ansible.controller.project:
    name: "{{ item['name'] }}"
    organization: Default
    controller_host: "{{ __health_check_controller_host }}"
